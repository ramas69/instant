doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true
        # Un mapping par bounded context (DDD light).
        # Chaque entité métier vit dans son contexte, sous src/<Context>/Entity/.
        mappings:
            User:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/User/Entity'
                prefix: 'App\User\Entity'
                alias: User
            Cours:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Cours/Entity'
                prefix: 'App\Cours\Entity'
                alias: Cours
            Achat:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Achat/Entity'
                prefix: 'App\Achat\Entity'
                alias: Achat
            Progression:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Progression/Entity'
                prefix: 'App\Progression\Entity'
                alias: Progression
            Certificat:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Certificat/Entity'
                prefix: 'App\Certificat\Entity'
                alias: Certificat

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
